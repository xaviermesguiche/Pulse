<style>
  :root {
    --purple-dark: #3b0764;
    --purple:      #4c1d95;
    --purple-mid:  #6d28d9;
    --purple-light:#c4b5fd;
    --bg:          #f5f3ff;
    --white:       #ffffff;
    --red:         #dc2626;
    --red-bg:      #fef2f2;
    --orange:      #ea580c;
    --orange-bg:   #fff7ed;
    --orange-light:#fed7aa;
    --yellow-bg:   #fefce8;
    --green:       #16a34a;
    --green-bg:    #f0fdf4;
    --blue:        #1e40af;
    --blue-bg:     #dbeafe;
    --gray:        #94a3b8;
    --text:        #1e293b;
    --radius:      14px;
    --shadow:      0 4px 24px rgba(76,29,149,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── HEADER ── */
  header {
    background: var(--purple);
    padding: 14px 18px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(76,29,149,0.3);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title {
    display: flex;
    flex-direction: column;
  }
  .header-title h1 {
    font-size: 1.35rem;
    font-weight: 700;
    color: white;
    letter-spacing: 0.04em;
  }
  .header-title span {
    font-size: 0.68rem;
    color: var(--purple-light);
    font-style: italic;
    margin-top: 1px;
  }
  .header-date {
    font-size: 0.75rem;
    color: var(--purple-light);
    text-align: right;
  }
  .refresh-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    border-radius: 50%;
    width: 36px; height: 36px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .refresh-btn:active { background: rgba(255,255,255,0.3); }

  /* ── MAIN ── */
  main { padding: 14px 12px; display: flex; flex-direction: column; gap: 14px; }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid #ede9fe;
  }
  .card-header h2 { font-size: 0.95rem; font-weight: 700; color: var(--text); }

  /* ── URGENCES ── */
  .urgences-card { border: 2px solid #fca5a5; background: var(--red-bg); }
  .urgences-card .card-header { border-bottom-color: #fca5a5; background: #fee2e2; }
  .urgences-card .card-header h2 { color: var(--red); }
  .urgences-body { padding: 10px 14px; }
  .urgence-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid #fecaca;
    font-size: 0.88rem;
    font-weight: 600;
    color: #991b1b;
  }
  .urgence-item:last-child { border-bottom: none; }
  .urgence-ok { color: var(--green); font-size: 0.88rem; padding: 8px 0; font-weight: 500; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th {
    background: #ede9fe;
    color: var(--purple);
    font-weight: 700;
    padding: 8px 10px;
    text-align: left;
    font-size: 0.78rem;
    white-space: nowrap;
  }
  td {
    padding: 8px 10px;
    border-bottom: 1px solid #f3f4f6;
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr.urgent   { background: #fee2e2; color: var(--red); }
  tr.warning  { background: var(--yellow-bg); color: var(--orange); }
  tr.good     { background: var(--green-bg); color: var(--green); }
  tr.c_urgent, tr.c_warning { background: var(--orange-light); color: var(--red); font-weight: 600; }
  tr.c_good   { background: var(--blue-bg); color: var(--blue); }
  tr.passed   { background: #f8fafc; color: var(--gray); }

  tr { cursor: pointer; transition: filter 0.15s; }
  tr:active { filter: brightness(0.93); }

  /* ── ADD BTN ── */
  .add-btn {
    margin: 10px 14px 14px;
    padding: 9px 16px;
    border: none;
    border-radius: 10px;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.2s;
  }
  .add-btn:active { opacity: 0.75; }
  .btn-purple { background: var(--purple-mid); color: white; }
  .btn-slate  { background: #475569; color: white; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,7,50,0.55);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px 18px 30px;
    animation: slideUp 0.28s cubic-bezier(.32,1.2,.5,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px;
    background: #e2e8f0;
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; color: var(--purple); }
  .modal label { font-size: 0.82rem; font-weight: 600; color: #64748b; display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select, .modal textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    background: #f8fafc;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus {
    border-color: var(--purple-mid);
    background: white;
  }
  .modal textarea { height: 160px; resize: none; font-family: 'Courier New', monospace; font-size: 0.85rem; }
  .modal-btns { display: flex; gap: 10px; margin-top: 18px; }
  .modal-btns button {
    flex: 1; padding: 12px;
    border: none; border-radius: 12px;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 0.92rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  .modal-btns button:active { opacity: 0.75; }
  .btn-cancel { background: #f1f5f9; color: #64748b; }
  .btn-save   { background: var(--purple-mid); color: white; }
  .btn-delete { background: #fee2e2; color: var(--red); }

  /* Tabs dans modal cours */
  .tabs { display: flex; gap: 0; border-bottom: 2px solid #ede9fe; margin-bottom: 14px; }
  .tab-btn {
    flex: 1; padding: 9px 6px;
    border: none; background: none;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 0.85rem; font-weight: 600;
    color: var(--gray); cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn.active { color: var(--purple-mid); border-bottom-color: var(--purple-mid); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Liste dates dans popup cours */
  .date-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
  .date-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 500;
  }
  .date-item.passed  { background: #f8fafc; color: var(--gray); }
  .date-item.today   { background: #fee2e2; color: var(--red); font-weight: 700; }
  .date-item.soon    { background: var(--orange-light); color: var(--red); font-weight: 600; }
  .date-item.future  { background: var(--blue-bg); color: var(--blue); }
  .date-item .jours  { margin-left: auto; font-size: 0.78rem; opacity: 0.8; white-space: nowrap; }

  /* Statut badge */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-red    { background: #fee2e2; color: var(--red); }
  .badge-orange { background: var(--orange-bg); color: var(--orange); }
  .badge-green  { background: var(--green-bg); color: var(--green); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid #ede9fe;
    display: flex;
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(76,29,149,0.08);
  }
  .nav-btn {
    flex: 1; padding: 10px 6px 12px;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    border: none; background: none;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 0.68rem; font-weight: 600;
    color: var(--gray); cursor: pointer;
    transition: color 0.2s;
  }
  .nav-btn .icon { font-size: 1.3rem; }
  .nav-btn.active { color: var(--purple-mid); }

  /* Sections */
  .section { display: none; }
  .section.active { display: block; }

  /* Toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: white;
    padding: 10px 20px; border-radius: 20px;
    font-size: 0.85rem; font-weight: 500;
    z-index: 300; opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="header-title">
      <h1>📊 P.U.L.S.E.</h1>
      <span>Planning & Urgences de Suivi des LEçons</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="header-date" id="headerDate"></div>
      <button class="refresh-btn" onclick="refreshAll()">⟳</button>
    </div>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- Section Tableau de bord -->
  <div class="section active" id="sec-dashboard">

    <!-- Urgences -->
    <div class="card urgences-card">
      <div class="card-header">
        <span>🔥</span>
        <h2>URGENCES IMMÉDIATES</h2>
      </div>
      <div class="urgences-body" id="urgencesBody"></div>
    </div>

    <!-- Examens -->
    <div class="card">
      <div class="card-header">
        <span>📅</span>
        <h2>Examens & Devoirs</h2>
      </div>
      <div class="table-wrap">
        <table id="examTable">
          <thead><tr><th>Date</th><th>Matière</th><th>Jours</th><th>Statut</th></tr></thead>
          <tbody id="examBody"></tbody>
        </table>
      </div>
      <button class="add-btn btn-purple" onclick="openAddExam()">＋ Nouvel Examen / Devoir</button>
    </div>

    <!-- Cours -->
    <div class="card">
      <div class="card-header">
        <span>📚</span>
        <h2>Mes Cours</h2>
      </div>
      <div class="table-wrap">
        <table id="coursTable">
          <thead><tr><th>Matière</th><th>Prochain</th><th>Reste</th><th>Séances</th></tr></thead>
          <tbody id="coursBody"></tbody>
        </table>
      </div>
      <button class="add-btn btn-slate" onclick="openAddCours()">＋ Nouvelle Matière</button>
    </div>

  </div>
</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ══════════════ MODALS ══════════════ -->

<!-- Modal Examen -->
<div class="modal-overlay" id="modalExam">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modalExamTitle">Nouvel Examen</h3>
    <label>Date</label>
    <input type="date" id="examDate">
    <label>Matière / Code</label>
    <input type="text" id="examSubject" placeholder="ex: CRM201">
    <label>Type</label>
    <select id="examType">
      <option>DST</option>
      <option>Travail à rendre</option>
      <option>Devoir</option>
      <option>Examen final</option>
      <option>Soutenance</option>
      <option>Projet</option>
    </select>
    <div id="examProgressWrap" style="display:none">
      <label>Statut</label>
      <select id="examProgress">
        <option value="pas fait">🔴 À faire</option>
        <option value="en cours">🟡 En cours</option>
        <option value="fait">✅ Fait</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modalExam')">Annuler</button>
      <button class="btn-delete" id="examDeleteBtn" style="display:none" onclick="deleteExam()">Supprimer</button>
      <button class="btn-save" onclick="saveExam()">Valider</button>
    </div>
  </div>
</div>

<!-- Modal Cours -->
<div class="modal-overlay" id="modalCours">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modalCoursTitle">Nouveau Cours</h3>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('tabDates')" id="btnTabDates">📅 Mes dates</button>
      <button class="tab-btn" onclick="switchTab('tabEdit')" id="btnTabEdit">✏️ Modifier</button>
    </div>
    <!-- Tab dates -->
    <div class="tab-panel active" id="tabDates">
      <div id="coursDatesList" class="date-list"></div>
    </div>
    <!-- Tab edit -->
    <div class="tab-panel" id="tabEdit">
      <label>Une date par ligne (JJ/MM/AAAA)</label>
      <textarea id="coursDates" placeholder="07/04/2026&#10;14/04/2026&#10;21/04/2026"></textarea>
      <div id="coursNameWrap">
        <label>Nom de la matière (si nouveau)</label>
        <input type="text" id="coursName" placeholder="ex: CRM207" style="display:none">
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modalCours')">Annuler</button>
      <button class="btn-delete" id="coursDeleteBtn" style="display:none" onclick="deleteCours()">Supprimer</button>
      <button class="btn-save" onclick="saveCours()">Valider</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// DONNÉES
// ══════════════════════════════════════
const EXAM_KEY  = 'pulse_exams';
const COURS_KEY = 'pulse_cours';

const EXAM_INITIAL = [
  {id:'e2', date:'2026-04-10', subject:'CRM206', type:'DST',             progress:null},
  {id:'e3', date:'2026-04-30', subject:'ANG330', type:'Travail à rendre', progress:'pas fait'},
  {id:'e4', date:'2026-05-15', subject:'CRM202', type:'Devoir',           progress:'pas fait'},
  {id:'e8', date:'2026-05-15', subject:'UAIP01', type:'Devoir',           progress:'pas fait'},
  {id:'e5', date:'2026-06-11', subject:'CRM203', type:'DST',             progress:null},
  {id:'e6', date:'2026-06-12', subject:'CRM204', type:'DST',             progress:null},
  {id:'e7', date:'2026-06-16', subject:'CRM205', type:'Soutenance',      progress:null},
];

const COURS_INITIAL = [
  {id:'c1', subject:'CRM201', sessions:['2026-04-03','2026-05-04']},
  {id:'c2', subject:'CRM202', sessions:['2026-05-15']},
  {id:'c3', subject:'CRM203', sessions:['2026-04-09','2026-06-11']},
  {id:'c4', subject:'CRM204', sessions:['2026-04-08','2026-04-24','2026-05-05','2026-05-13','2026-05-22','2026-05-29','2026-06-12']},
  {id:'c5', subject:'CRM205', sessions:['2026-04-07','2026-04-14','2026-04-21','2026-05-12','2026-05-19','2026-05-26','2026-06-16']},
  {id:'c6', subject:'CRM206', sessions:['2026-04-10']},
];

function loadExams()  { try { return JSON.parse(localStorage.getItem(EXAM_KEY))  || EXAM_INITIAL.map(e=>({...e})); } catch { return EXAM_INITIAL.map(e=>({...e})); } }
function loadCours()  { try { return JSON.parse(localStorage.getItem(COURS_KEY)) || COURS_INITIAL.map(c=>({...c})); } catch { return COURS_INITIAL.map(c=>({...c})); } }
function saveExams(d) { localStorage.setItem(EXAM_KEY,  JSON.stringify(d)); }
function saveCours(d) { localStorage.setItem(COURS_KEY, JSON.stringify(d)); }

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
const TODAY = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const daysLeft = ds => Math.round((new Date(ds) - TODAY()) / 86400000);
const isHW = t => /travail|rendre|devoir|projet|dossier/i.test(t);
const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

function fmtDate(ds) {
  const d = new Date(ds + 'T00:00:00');
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(2)}`;
}
function fmtDateFR(ds) {
  const d = new Date(ds + 'T00:00:00');
  return `${JOURS[d.getDay()]} ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function parseDate(s) {
  if (!s) return null;
  s = s.trim();
  let m;
  if (m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/)) return `${m[1]}-${m[2]}-${m[3]}`;
  if (m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/)) return `${m[3]}-${m[2]}-${m[1]}`;
  if (m = s.match(/^(\d{2})\/(\d{2})\/(\d{2})$/)) return `20${m[3]}-${m[2]}-${m[1]}`;
  return null;
}
function futureSessions(sessions) {
  const today = TODAY().toISOString().slice(0,10);
  return sessions.filter(s => s >= today).sort();
}
function uid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

// ══════════════════════════════════════
// REFRESH
// ══════════════════════════════════════
function refreshAll() {
  const now = new Date();
  const jours = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const mois  = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  document.getElementById('headerDate').textContent =
    `${jours[now.getDay()]} ${now.getDate()} ${mois[now.getMonth()]} ${now.getFullYear()}`;

  renderUrgences();
  renderExams();
  renderCours();
  showToast('Actualisé ✓');
}

// ── Urgences ──
function renderUrgences() {
  const exams = loadExams();
  const body = document.getElementById('urgencesBody');
  const items = exams.filter(e => {
    const d = daysLeft(e.date);
    return d >= 0 && d <= 7;
  }).sort((a,b) => a.date.localeCompare(b.date));

  if (!items.length) {
    body.innerHTML = '<div class="urgence-ok">✅ Aucune urgence — tout est sous contrôle !</div>';
    return;
  }
  body.innerHTML = items.map(e => {
    const d = daysLeft(e.date);
    const emoji = d <= 3 ? '🔥' : '⚠️';
    return `<div class="urgence-item">${emoji} <span>${e.subject} — ${e.type} <strong>(${d} jour${d>1?'s':''})</strong></span></div>`;
  }).join('');
}

// ── Examens ──
function renderExams() {
  const exams = loadExams().filter(e => daysLeft(e.date) >= -15)
    .sort((a,b) => a.date.localeCompare(b.date));
  const body = document.getElementById('examBody');
  body.innerHTML = exams.map(e => {
    const d = daysLeft(e.date);
    const joursStr = d < 0 ? 'Passé' : d === 0 ? 'AUJOURD\'HUI' : `${d}j`;
    let statut, cls;
    if (isHW(e.type)) {
      const prog = e.progress || 'pas fait';
      statut = prog === 'fait' ? '✅ Fait' : prog === 'en cours' ? '🟡 En cours' : '🔴 À faire';
      cls = prog === 'fait' ? 'good' : d <= 7 ? 'urgent' : 'warning';
    } else {
      statut = e.type;
      cls = d <= 7 ? 'urgent' : d <= 21 ? 'warning' : 'good';
    }
    if (d < 0) cls = 'passed';
    return `<tr class="${cls}" onclick="openEditExam('${e.id}')">
      <td>${fmtDate(e.date)}</td>
      <td><strong>${e.subject}</strong></td>
      <td>${joursStr}</td>
      <td>${statut}</td>
    </tr>`;
  }).join('');
}

// ── Cours ──
function renderCours() {
  const cours = loadCours();
  cours.sort((a,b) => {
    const fa = futureSessions(a.sessions)[0] || '9999';
    const fb = futureSessions(b.sessions)[0] || '9999';
    return fa.localeCompare(fb);
  });
  const body = document.getElementById('coursBody');
  body.innerHTML = cours.map(c => {
    const future = futureSessions(c.sessions);
    const total  = c.sessions.length;
    const reste  = `${future.length}/${total}`;
    let prochain, cls;
    if (total === 0) {
      prochain = '— À saisir'; cls = 'c_good';
    } else if (future.length === 0) {
      prochain = '✅ Terminé'; cls = 'c_good';
    } else {
      const next = future[0];
      const d = daysLeft(next);
      if (d === 0)     { prochain = '🔥 Aujourd\'hui'; cls = 'c_urgent'; }
      else if (d === 1){ prochain = '🔥 Demain';       cls = 'c_urgent'; }
      else if (d <= 5) { prochain = `🔴 ${fmtDate(next)}`; cls = 'c_warning'; }
      else             { prochain = fmtDate(next);     cls = 'c_good'; }
    }
    const seances = future.length > 0 ? `📅 ${future.length} date${future.length>1?'s':''}` : '—';
    return `<tr class="${cls}" onclick="openEditCours('${c.id}')">
      <td><strong>${c.subject}</strong></td>
      <td>${prochain}</td>
      <td>${reste}</td>
      <td>${seances}</td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════
// MODAL EXAM
// ══════════════════════════════════════
let currentExamId = null;

function openAddExam() {
  currentExamId = null;
  document.getElementById('modalExamTitle').textContent = 'Nouvel Examen / Devoir';
  document.getElementById('examDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('examSubject').value = '';
  document.getElementById('examType').value = 'DST';
  document.getElementById('examProgressWrap').style.display = 'none';
  document.getElementById('examDeleteBtn').style.display = 'none';
  openModal('modalExam');
}

function openEditExam(id) {
  const exam = loadExams().find(e => e.id === id);
  if (!exam) return;
  currentExamId = id;
  document.getElementById('modalExamTitle').textContent = `Modifier — ${exam.subject}`;
  document.getElementById('examDate').value = exam.date;
  document.getElementById('examSubject').value = exam.subject;
  document.getElementById('examType').value = exam.type;
  const hw = isHW(exam.type);
  document.getElementById('examProgressWrap').style.display = hw ? 'block' : 'none';
  if (hw) document.getElementById('examProgress').value = exam.progress || 'pas fait';
  document.getElementById('examDeleteBtn').style.display = 'block';
  openModal('modalExam');
}

document.getElementById('examType').addEventListener('change', function() {
  document.getElementById('examProgressWrap').style.display = isHW(this.value) ? 'block' : 'none';
});

function saveExam() {
  const date    = document.getElementById('examDate').value;
  const subject = document.getElementById('examSubject').value.trim().toUpperCase();
  const type    = document.getElementById('examType').value;
  if (!date || !subject) { showToast('⚠️ Champs incomplets'); return; }
  const exams = loadExams();
  if (currentExamId) {
    const e = exams.find(e => e.id === currentExamId);
    if (e) { e.date = date; e.subject = subject; e.type = type;
      if (isHW(type)) e.progress = document.getElementById('examProgress').value; }
  } else {
    exams.push({ id: uid(), date, subject, type,
      progress: isHW(type) ? 'pas fait' : null });
  }
  saveExams(exams);
  closeModal('modalExam');
  refreshAll();
}

function deleteExam() {
  if (!currentExamId) return;
  if (!confirm('Supprimer cet examen ?')) return;
  saveExams(loadExams().filter(e => e.id !== currentExamId));
  closeModal('modalExam');
  refreshAll();
}

// ══════════════════════════════════════
// MODAL COURS
// ══════════════════════════════════════
let currentCoursId = null;

function openAddCours() {
  currentCoursId = null;
  document.getElementById('modalCoursTitle').textContent = 'Nouvelle Matière';
  document.getElementById('coursDates').value = '';
  document.getElementById('coursName').value = '';
  document.getElementById('coursName').style.display = 'block';
  document.getElementById('coursDeleteBtn').style.display = 'none';
  document.getElementById('coursDatesList').innerHTML = '<p style="color:#94a3b8;font-size:0.85rem;padding:10px 0">Aucune date encore. Ajoutez-en dans l\'onglet ✏️</p>';
  switchTab('tabEdit');
  openModal('modalCours');
}

function openEditCours(id) {
  const c = loadCours().find(c => c.id === id);
  if (!c) return;
  currentCoursId = id;
  document.getElementById('modalCoursTitle').textContent = `📚 ${c.subject}`;
  document.getElementById('coursName').style.display = 'none';
  document.getElementById('coursDeleteBtn').style.display = 'block';

  // Remplir l'éditeur
  document.getElementById('coursDates').value = c.sessions
    .map(s => { const d = new Date(s+'T00:00:00'); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; })
    .join('\n');

  // Remplir la liste
  const list = document.getElementById('coursDatesList');
  const today = TODAY().toISOString().slice(0,10);
  const sorted = [...c.sessions].sort();
  if (!sorted.length) {
    list.innerHTML = '<p style="color:#94a3b8;font-size:0.85rem;padding:10px 0">Aucune date saisie.</p>';
  } else {
    list.innerHTML = sorted.map(s => {
      const d = daysLeft(s);
      let cls, emoji, info;
      if (d < 0)      { cls='passed'; emoji='✅'; info='passé'; }
      else if(d===0)  { cls='today';  emoji='🔥'; info="AUJOURD'HUI"; }
      else if(d<=5)   { cls='soon';   emoji='🔴'; info=`dans ${d} jour${d>1?'s':''}`; }
      else            { cls='future'; emoji='📌'; info=`dans ${d} jours`; }
      return `<div class="date-item ${cls}">
        <span>${emoji}</span>
        <span>${fmtDateFR(s)}</span>
        <span class="jours">${info}</span>
      </div>`;
    }).join('');
  }

  switchTab('tabDates');
  openModal('modalCours');
}

function saveCours() {
  const textarea = document.getElementById('coursDates').value.trim();
  const lines = textarea ? textarea.split('\n') : [];
  const dates = [];
  for (let line of lines) {
    line = line.trim();
    if (!line) continue;
    const p = parseDate(line);
    if (!p) { showToast(`⚠️ Format invalide : ${line}`); return; }
    dates.push(p);
  }
  const cours = loadCours();
  if (currentCoursId) {
    const c = cours.find(c => c.id === currentCoursId);
    if (c) c.sessions = dates.sort();
  } else {
    const name = document.getElementById('coursName').value.trim().toUpperCase();
    if (!name) { showToast('⚠️ Nom de matière requis'); return; }
    cours.push({ id: uid(), subject: name, sessions: dates.sort() });
  }
  saveCours(cours);
  closeModal('modalCours');
  refreshAll();
}

function deleteCours() {
  if (!currentCoursId) return;
  if (!confirm('Supprimer cette matière ?')) return;
  saveCours(loadCours().filter(c => c.id !== currentCoursId));
  closeModal('modalCours');
  refreshAll();
}

// ══════════════════════════════════════
// TABS
// ══════════════════════════════════════
function switchTab(tabId) {
  ['tabDates','tabEdit'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === tabId);
  });
  ['btnTabDates','btnTabEdit'].forEach(id => {
    const btn = document.getElementById(id);
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(tabId));
  });
}

// ══════════════════════════════════════
// MODAL UTILS
// ══════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Fermer en cliquant hors du modal
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
